name: Build Tenant APK
on:
  workflow_dispatch:  # Manual trigger from GitHub
  push:
    branches: [main]
    paths:
      - 'tenant_app/**'
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tenant_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Get dependencies
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tenant-app-release
          path: tenant_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
