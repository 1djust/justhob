name: Security Static Analysis Scan
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run Vulnerability Security Scan
        run: |
          python3 .agents/skills/vulnerability-scanner/scripts/security_scan.py property-management-saas --output summary
